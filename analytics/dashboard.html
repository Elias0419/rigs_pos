<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>RIGS Dashboard</title>
  <style>
    :root { color-scheme: light; --blue:#0f172a; --accent:#2563eb; --muted:#64748b; --border:#dbe3ef; --bg:#f4f7fb; }
    * { box-sizing: border-box; }
    body { margin:0; min-height:100vh; background:var(--bg); font-family: Inter, Segoe UI, Arial, sans-serif; color:var(--blue); }
    header { display:flex; align-items:center; justify-content:space-between; gap:16px; padding:16px 20px; background:#fff; border-bottom:1px solid var(--border); box-shadow:0 2px 10px rgba(15,23,42,.06); }
    h1 { margin:0; font-size:20px; letter-spacing:.01em; }
    .sub { color:var(--muted); font-size:13px; margin-top:2px; }
    .tabs { display:flex; gap:8px; flex-wrap:wrap; }
    .tab { border:1px solid var(--border); background:#fff; color:var(--blue); border-radius:999px; padding:10px 16px; font-weight:700; cursor:pointer; transition:.15s ease; }
    .tab:hover, .tab.active { background:var(--accent); border-color:var(--accent); color:#fff; }
    main { height:calc(100vh - 75px); padding:12px; }
    iframe { display:none; width:100%; height:100%; border:1px solid var(--border); border-radius:14px; background:#fff; box-shadow:0 8px 22px rgba(15,23,42,.08); }
    iframe.active { display:block; }
  </style>
</head>
<body>
  <header>
    <div>
      <h1>RIGS Dashboard</h1>
    </div>
    <nav class="tabs" aria-label="Dashboard tabs">
      <button class="tab active" data-panel="analytics">Analytics</button>
      <button class="tab" data-panel="taxes">Taxes</button>
      <button class="tab" data-panel="categories">Categories</button>
    </nav>
  </header>
  <main>
    <iframe id="analytics" class="active" title="Analytics dashboard" data-src="/analytics/"></iframe>
    <iframe id="taxes" title="Tax dashboard" data-src="/taxes/"></iframe>
    <iframe id="categories" title="Category dashboard" data-src="/categories/"></iframe>
  </main>
  <script>
    function loadPanel(panel) {
      if (!panel.src) panel.src = `${panel.dataset.src}?refresh=${Date.now()}`;
    }
    const panels = [...document.querySelectorAll('iframe')];
    loadPanel(document.querySelector('iframe.active'));
    document.querySelectorAll('.tab').forEach((tab) => {
      tab.addEventListener('click', () => {
        document.querySelectorAll('.tab').forEach((item) => item.classList.toggle('active', item === tab));
        panels.forEach((panel) => panel.classList.toggle('active', panel.id === tab.dataset.panel));
        loadPanel(document.getElementById(tab.dataset.panel));
      });
    });
  </script>
</body>
</html>
