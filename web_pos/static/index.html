<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Rigs POS Web Prototype</title>
  <link rel="stylesheet" href="/static/styles.css" />
</head>
<body>
  <main class="shell">
    <section class="left pane">
      <div class="brand-row">
        <div>
          <p class="eyebrow">Browser POS prototype</p>
          <h1>Rigs Register</h1>
        </div>
        <button id="clearOrder" class="ghost danger">Clear</button>
      </div>

      <form id="scanForm" class="scan-card">
        <label for="scanInput">Scan barcode</label>
        <div class="scan-row">
          <input id="scanInput" autocomplete="off" inputmode="numeric" placeholder="Scan or type barcode…" />
          <button type="submit">Add</button>
        </div>
        <p class="hint">This field stays focused so a keyboard-wedge scanner can feed it directly.</p>
      </form>

      <div class="search-card">
        <label for="searchInput">Search inventory</label>
        <input id="searchInput" autocomplete="off" placeholder="Name, SKU, UPC…" />
        <div id="searchResults" class="results"></div>
      </div>
    </section>

    <section class="right pane order-pane">
      <div class="order-header">
        <div>
          <p class="eyebrow">Current order</p>
          <h2 id="orderId">Ready</h2>
        </div>
        <div id="status" class="status">Idle</div>
      </div>

      <div id="orderItems" class="order-items empty">No items yet.</div>

      <section class="totals">
        <div><span>Subtotal</span><strong id="subtotal">$0.00</strong></div>
        <div><span>Discount</span><strong id="discount">$0.00</strong></div>
        <div><span>Tax</span><strong id="tax">$0.00</strong></div>
        <div class="grand"><span>Total</span><strong id="total">$0.00</strong></div>
      </section>

      <section class="payment">
        <div class="payment-methods" role="group" aria-label="Payment method">
          <button data-method="Cash" class="pay-method selected">Cash</button>
          <button data-method="Debit" class="pay-method">Debit</button>
          <button data-method="Credit" class="pay-method">Credit</button>
        </div>
        <div class="cash-row">
          <label for="amountTendered">Tendered</label>
          <input id="amountTendered" inputmode="decimal" placeholder="0.00" />
          <button id="exactCash" class="ghost">Exact</button>
        </div>
        <div class="change-row">Change: <strong id="change">$0.00</strong></div>
        <button id="takePayment" class="primary">Take payment</button>
        <button id="finalize" class="finish">Finalize order</button>
      </section>
    </section>
  </main>

  <script src="/static/app.js"></script>
</body>
</html>
